; Workbench ESP32 firmware — one env per board, built with PlatformIO's
; ESP-IDF integration (unifies tooling with sprocket-robotics/robot + hub).
;
; The C source is unchanged from the idf.py layout: the IDF-native `main/`
; component (src_dir below) with its Kconfig board choice. Each board's
; CONFIG_BR_BOARD_* + PSRAM/flash knobs come from the same layered defaults
; the old build.sh composed — base sdkconfig.defaults + the per-board
; overlay, passed through as SDKCONFIG_DEFAULTS.
;
;   pio run -e s3_cam            # build one board
;   pio run -e s3_cam -t upload  # flash it
;   pio run                      # build every board

[platformio]
src_dir = main

[env]
; espressif32 6.13.0 ships ESP-IDF 5.5.3 — matches robot/hub, ~= the 5.5.x
; the source targets. Pin held for reproducible builds.
platform = espressif32@6.13.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv

[env:aithinker_cam]
board = esp32cam
board_build.cmake_extra_args =
    -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.board.aithinker_cam"

[env:devkit]
board = az-delivery-devkit-v4
board_build.cmake_extra_args =
    -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.board.devkit"

[env:s3_cam]
board = freenove_esp32_s3_wroom
board_build.cmake_extra_args =
    -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.board.s3_cam"

[env:c3_supermini]
board = esp32-c3-devkitm-1
board_build.cmake_extra_args =
    -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.board.c3_supermini"
